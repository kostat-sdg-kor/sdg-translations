1-short: 빈곤퇴치
1-title: 모든 곳에서 모든 형태의 빈곤 종식
2-short: 기아종식
2-title: 기아 종식, 식량안보와 영양 개선 달성 및 지속가능한 농업 진흥
3-short: 건강과 웰빙
3-title: 모든 연령층의 모두를 위한 건강한 삶 보장 및 웰빙 증진
4-short: 양질의 교육
4-title: 포용적이고 공평한 양질의 교육 보장 및 모두를 위한 평생학습 기회 증진
5-short: 양성평등
5-title: 성평등 달성 및 모든 여성과 여아의 권한 강화
6-short: 물과 위생
6-title: 모두를 위한 물과 위생의 이용가능성 및 지속가능한 관리 보장
7-short: 깨끗한 에너지
7-title: 모두를 위한 저렴하고 신뢰할 수 있으며 지속가능하고 현대적인 에너지에 대한 접근 보장
8-short: 양질의 일자리와 경제성장
8-title: 모두를 위한 지속적이고 포용적이며 지속가능한 경제성장 및 완전하고 생산적인 고용과 양질의 일자리 증진
9-short: 산업, 혁신과 사회기반시설
9-title: 회복력 있는 사회기반시설 구축, 포용적이고 지속가능한 산업화 증진 및 혁신 촉진
10-short: 불평등 완화
10-title: 국가내 및 국가간 불평등 완화
11-short: 지속가능한 도시와 공동체
11-title: 포용적이고 안전하며 회복력 있고 지속가능한 도시와 거주지 조성
12-short: 책임감 있는 소비와 생산
12-title: 지속가능한 소비 및 생산 양식 보장
13-short: 기후변화 대응
13-title: 기후변화와 그 영향을 방지하기 위한 긴급한 행동의 실시
14-short: 해양 생태계
14-title: 대양, 바다 및 해양자원 보존 및 지속가능한 사용
15-short: 육상 생태계
15-title: 육상 생태계의 보호, 복원 및 지속가능한 이용 증진, 산림의 지속가능한 관리, 사막화 방지, 토지황폐화 중지와 회복 및 생물다양성 손실 중지 
16-short: 평화와 정의
16-title: 지속가능발전을 위한 평화롭고 포용적인 사회 증진, 모두에게 정의에 대한 접근 제공 및 모든 수준에서 효과적이며, 책임성있고 포용적인 제도 구축
17-short: SDGs를 위한 파트너십
17-title: 이행수단 강화 및 지속가능발전을 위한 글로벌 파트너십 활성화
